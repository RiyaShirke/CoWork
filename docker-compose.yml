services:
  ollama:
    image: ollama/ollama:latest
    container_name: cowork-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  kreuzberg:
    image: ghcr.io/kreuzberg-dev/kreuzberg:latest
    container_name: cowork-kreuzberg
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - kreuzberg_cache:/app/.kreuzberg

volumes:
  ollama_models:
  kreuzberg_cache:
